<!DOCTYPE html>
<html lang="mr">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | Tirumala Marketing</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<nav class="navbar">

   <a href="index.html" class="brand">

    <img src="images/logo.png" class="logo">

    <div class="brand-text">

        <h2>Tirumala Marketing</h2>

        <p>Fresh Snacks & Namkeen</p>

    </div>

</a>

    <button id="darkToggle" class="dark-btn">
        🌙
    </button>

</nav>

<div class="login-page">

    <div class="login-card">

        <div class="login-logo">
            

            <img src="images/logo.png" class="login-logo-img">

        </div>

        <h1>Welcome Back 👋</h1>

        <p class="login-subtitle">
            Login to continue shopping
        </p>

        <div class="input-group">

            <label>📱 Mobile Number</label>

            <input
            id="mobile"
            type="text"
            placeholder="Enter Mobile Number">

        </div>

        <div class="input-group">

            <label>🔒 Password</label>

            <div class="password-box">

                <input
                id="password"
                type="password"
                placeholder="Enter Password">

                <span id="togglePassword">
                    👁
                </span>

            </div>

        </div>

        <button class="login-btn" onclick="loginUser()">

            Login

        </button>
        <div style="text-align:right;margin-top:10px;">

    <a href="forgot-password.html"
       style="color:#ff9800;font-weight:600;text-decoration:none;">

        Forgot Password?

    </a>

</div>

        <p class="register-link">

            New User?

            <a href="register.html">

                Create Account

            </a>

        </p>

    </div>

</div>
<script>

async function loginUser(){

const mobile=document.getElementById("mobile").value.trim();

const password=document.getElementById("password").value;

if(!mobile || !password){

alert("सर्व माहिती भरा");

return;

}

const response=await fetch("/api/login",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

mobile,

password

})

});

const data=await response.json();

if(data.success){

localStorage.setItem(

"tirumala_user",

JSON.stringify(data.user)

);

alert("Login Successful");

window.location.href="profile.html";

}else{

alert(data.message);

}

}

// ===========================
// SHOW / HIDE PASSWORD
// ===========================

document.getElementById("togglePassword").onclick = () => {

    const pass = document.getElementById("password");

    if (pass.type === "password") {

        pass.type = "text";

        document.getElementById("togglePassword").innerHTML = "🙈";

    } else {

        pass.type = "password";

        document.getElementById("togglePassword").innerHTML = "👁";

    }

};

// ===========================
// DARK MODE
// ===========================

const darkBtn = document.getElementById("darkToggle");

if (localStorage.getItem("theme") === "dark") {

    document.body.classList.add("dark");

    darkBtn.innerHTML = "☀️";

}

darkBtn.onclick = () => {

    document.body.classList.toggle("dark");

    if (document.body.classList.contains("dark")) {

        localStorage.setItem("theme", "dark");

        darkBtn.innerHTML = "☀️";

    } else {

        localStorage.setItem("theme", "light");

        darkBtn.innerHTML = "🌙";

    }

};

</script>

</body>

</html>
