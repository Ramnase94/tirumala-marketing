<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forgot Password</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<nav class="navbar">

<a href="index.html" class="brand">

<img src="images/logo.png" class="logo">

<div class="brand-text">

<h2>Tirumala Marketing</h2>

<p>Fresh Snacks & Namkeen</p>

</div>

</a>

</nav>

<div class="login-page">

<div class="login-card">

<div class="login-header">

<img src="images/logo.png" class="login-logo-img">

<h2>Forgot Password</h2>

<p>Enter your registered Email</p>

</div>

<div class="input-group">

<label>📧 Email</label>

<input
id="email"
type="email"
placeholder="Enter Registered Email">

</div>

<button
class="login-btn"
id="sendOtpBtn">

📧 Send OTP

</button>

<div
id="otpSection"
style="display:none;">

<div class="input-group">

<label>🔢 OTP</label>

<input
id="otp"
type="text"
placeholder="Enter OTP">

</div>

<div class="input-group">

<label>🔒 New Password</label>

<input
id="newPassword"
type="password"
placeholder="New Password">

</div>

<button
class="login-btn"
id="resetBtn">

Reset Password

</button>

</div>

</div>

</div>

<script>

document.getElementById("sendOtpBtn").onclick = async function () {

    const email = document.getElementById("email").value.trim();

    if (!email) {

        alert("Email टाका");

        return;

    }

    const res = await fetch("/api/send-otp", {

        method: "POST",

        headers: {
            "Content-Type": "application/json"
        },

        body: JSON.stringify({
            email
        })

    });

    const data = await res.json();

    alert(data.message);

    if (data.success) {

        document.getElementById("otpSection").style.display = "block";

        this.style.display = "none";

    }

};


// ==========================
// RESET PASSWORD
// ==========================

document.getElementById("resetBtn").onclick = async function () {

    const email = document.getElementById("email").value.trim();
    const otp = document.getElementById("otp").value.trim();
    const password = document.getElementById("newPassword").value;

    if (!otp || !password) {

        alert("OTP आणि नवीन Password टाका");
        return;

    }

    if (password.length < 6) {

        alert("Password कमीत कमी 6 अक्षरांचा असावा");
        return;

    }

    const res = await fetch("/api/reset-password", {

        method: "POST",

        headers: {
            "Content-Type": "application/json"
        },

        body: JSON.stringify({

            email,
            otp,
            password

        })

    });

    const data = await res.json();

    alert(data.message);

    if (data.success) {

        window.location.href = "login.html";

    }

};
</script>

</body>

</html>
