<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Invoice | Tirumala Marketing</title>

<link rel="stylesheet" href="css/style.css">

<style>

body{

background:#f5f5f5;
font-family:Poppins,sans-serif;
margin:0;
padding:30px;

}

.invoice{

max-width:900px;
margin:auto;
background:#fff;
padding:35px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,.1);

}

.top{

display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;

}

.logo-box{

display:flex;
align-items:center;
gap:15px;

}

.logo-box img{

width:80px;

}

.company h2{

margin:0;
color:#ff9800;

}

.company p{

margin:3px 0;
color:#666;

}

.invoice-title{

text-align:right;

}

.invoice-title h1{

margin:0;
color:#333;

}

.invoice-title p{

margin:5px 0;

}

.info{

display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-top:25px;

}

.info-card{

background:#fafafa;
padding:15px;
border-radius:10px;

}

.info-card h3{

margin-top:0;
color:#ff9800;

}

table{

width:100%;
border-collapse:collapse;
margin-top:30px;

}

table th{

background:#ff9800;
color:#fff;
padding:12px;

}

table td{

padding:12px;
border-bottom:1px solid #eee;

}

.total{

text-align:right;
font-size:22px;
font-weight:bold;
margin-top:25px;

}

.buttons{

margin-top:30px;
display:flex;
gap:15px;

}

.buttons button{

flex:1;
padding:15px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;

}

#printBtn{

background:#2196f3;
color:#fff;

}

#downloadBtn{

background:#4caf50;
color:#fff;

}

@media(max-width:700px){

.top{

flex-direction:column;
text-align:center;

}

.info{

grid-template-columns:1fr;

}

.buttons{

flex-direction:column;

}

}

</style>

</head>

<body>

<div class="invoice">

<div class="top">

<div class="logo-box">

<img src="images/logo.png">

<div class="company">

<h2>Tirumala Marketing</h2>

<p>Fresh Snacks & Namkeen</p>

<p>India</p>

</div>

</div>

<div class="invoice-title">

<h1>INVOICE</h1>

<p id="invoiceId"></p>

<p id="invoiceDate"></p>

</div>

</div>

<div class="info">

<div class="info-card">

<h3>Customer</h3>

<p id="customerName"></p>

<p id="customerMobile"></p>

<p id="customerAddress"></p>

</div>

<div class="info-card">

<h3>Payment</h3>
<p>
Status :
<span id="paymentStatus"></span>
</p>

<p>
Method :
<span id="paymentMethod"></span>
</p>

<p>
Transaction ID :
<span id="transactionId"></span>
</p>

<p>
Total :
₹<span id="paymentTotal"></span>
</p>

</div>

</div>

<table>

<thead>

<tr>

<th>Product</th>

<th>Qty</th>

<th>Price</th>

<th>Total</th>

</tr>

</thead>

<tbody id="invoiceItems">

</tbody>

</table>

<div class="total">

Grand Total :
₹<span id="grandTotal"></span>

</div>

<div class="buttons no-print">
<button id="printBtn">

🖨 Print Invoice

</button>

<button id="downloadBtn">

📥 Download PDF

</button>

</div>

</div>
<script>

const order =
JSON.parse(localStorage.getItem("last_order"));

if(!order){

alert("Invoice Not Found");

location.href="profile.html";

}

document.getElementById("invoiceId").innerText =
"Order ID : " + order.orderId;

document.getElementById("invoiceDate").innerText =
new Date(order.date || Date.now()).toLocaleString();
document.getElementById("customerName").innerText =
order.name ||
order.customerName ||
currentUser.name ||
"Customer";
document.getElementById("customerMobile").innerText =
order.mobile || "";

document.getElementById("customerAddress").innerText =
order.address || "No Address";


document.getElementById("paymentStatus").innerText =
order.paymentStatus || "Pending";

document.getElementById("paymentMethod").innerText =
order.paymentMethod || "Cash On Delivery";

document.getElementById("transactionId").innerText =
order.transactionId || "--";

document.getElementById("paymentTotal").innerText =
order.totalAmount;

document.getElementById("grandTotal").innerText =
order.totalAmount;

let html="";

order.items.forEach(item=>{

const total =
item.qty * item.price;

html += `

<tr>

<td>

${item.name}

</td>

<td>

${item.qty}

</td>

<td>

₹${item.price}

</td>

<td>

₹${total}

</td>

</tr>

`;

});

document.getElementById("invoiceItems").innerHTML =
html;

document.getElementById("printBtn").onclick = ()=>{

window.print();

};

</script>
<!-- html2pdf -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script>
document.getElementById("downloadBtn").onclick = () => {

    const invoice = document.querySelector(".invoice");

    const buttons = document.querySelector(".buttons");

    buttons.style.display = "none";

    const options = {

        margin:0.4,

        filename:"Invoice_"+order.orderId+".pdf",

        image:{type:"jpeg",quality:1},

        html2canvas:{scale:2},

        jsPDF:{
            unit:"in",
            format:"a4",
            orientation:"portrait"
        }

    };

    html2pdf()
    .set(options)
    .from(invoice)
    .save()
    .then(()=>{

        buttons.style.display = "flex";

    });

};

</script>

<style>

@media print{

body{

background:#fff;

padding:0;

}

.navbar,
.buttons{

display:none !important;

}

.invoice{

box-shadow:none;

border:none;

width:100%;

max-width:100%;

margin:0;

padding:0;

}

}

</style>

</body>

</html>
