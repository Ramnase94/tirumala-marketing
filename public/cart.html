    <script>
        let shoppingCart = JSON.parse(localStorage.getItem('tirumala_cart')) || [];


    function displayCart(){
    updateCartBadge();

    const list = document.getElementById("cartList");

    const bill = document.getElementById("totalBill");

    const subTotal = document.getElementById("subTotal");

    const count = document.getElementById("cartCount");

    if(shoppingCart.length===0){

        list.innerHTML=`
        <div style="text-align:center;padding:50px">

        <h2>🛒</h2>

        <h3>Your Cart is Empty</h3>

        <a href="index.html" class="btn">
        Continue Shopping
        </a>

        </div>
        `;

        bill.innerText=0;

        subTotal.innerText=0;

        count.innerText="0 Items";

        return;

    }

    let total=0;

    list.innerHTML="";

    shoppingCart.forEach((item,index)=>{

        if(!item.qty){

            item.qty=1;

        }

        total+=item.price*item.qty;

        list.innerHTML+=`

<div class="cart-item">

<div class="item-left">

<img src="${item.image}">

<div class="item-info">

<h3>${item.name}</h3>

<p>${item.weight}</p>

<h2>₹${item.price}</h2>

<div class="qty-box">

<button
class="qty-btn"
onclick="decreaseQty(${index})">

-

</button>

<b>${item.qty}</b>

<button
class="qty-btn"
onclick="increaseQty(${index})">

+

</button>

</div>

<button
class="remove-btn"
onclick="removeItem(${index})">

🗑 Remove

</button>

<button
class="save-btn">

❤️ Save

</button>

</div>

</div>

</div>

`;

    });

    bill.innerText=total;

    subTotal.innerText=total;

    count.innerText=shoppingCart.length+" Items";

    updateProgress(total);

    localStorage.setItem(
        "tirumala_cart",
        JSON.stringify(shoppingCart)
    );

}


function increaseQty(index){

shoppingCart[index].qty++;

displayCart();

}

function decreaseQty(index){

if(shoppingCart[index].qty>1){

shoppingCart[index].qty--;

}else{

shoppingCart.splice(index,1);

}


displayCart();

}        
        document.getElementById('custName').addEventListener('input', (e) => localStorage.setItem('cust_name', e.target.value));
        document.getElementById('custPhone').addEventListener('input', (e) => localStorage.setItem('cust_phone', e.target.value));
        document.getElementById('custAddress').addEventListener('input', (e) => localStorage.setItem('cust_address', e.target.value));
        document.getElementById('custName').value = localStorage.getItem('cust_name') || '';
        document.getElementById('custPhone').value = localStorage.getItem('cust_phone') || '';
        document.getElementById('custAddress').value = localStorage.getItem('cust_address') || '';




function updateCartBadge(){

    const badge = document.getElementById("cartBadge");

    if(!badge) return;

    badge.innerText = shoppingCart.length;

}

        async function loadRecommendedProducts(){

    const res = await fetch("/api/products");

    const products = await res.json();

    const container = document.getElementById("recommendedProducts");

    container.innerHTML = "";

    products.slice(0,3).forEach(product=>{

        container.innerHTML += `

        <div class="recommend-card">

            <img src="${product.image}" alt="${product.name}">

            <h4>${product.name}</h4>

            <p>${product.weight}</p>

            <h3>₹${product.price}</h3>

            <button
            class="small-btn"
            onclick="addRecommended(${product.id})">

            Add

            </button>

        </div>

        `;

    });

}




function addRecommended(id){

    fetch("/api/products")

    .then(res=>res.json())

    .then(products=>{

        const product = products.find(p=>p.id==id);

        if(!product) return;

        const exists = shoppingCart.find(i=>i.id==product.id);

        if(exists){

            exists.qty++;

        }else{

            shoppingCart.push({

                id:product.id,

                name:product.name,

                price:Number(product.price),

                weight:product.weight,

                image:product.image,

                qty:1

            });

        }

        localStorage.setItem(

            "tirumala_cart",

            JSON.stringify(shoppingCart)

        );

        displayCart();

    });

}


function applyCoupon(){

    const code = document
        .getElementById("couponCode")
        .value
        .trim()
        .toUpperCase();

    let total = shoppingCart.reduce((sum,item)=>{

        return sum + Number(item.price);

    },0);

    let discount = 0;

    if(code==="WELCOME50"){

        discount = 50;

    }

    else if(code==="SAVE20"){

        discount = 20;

    }

    else{

        alert("Invalid Coupon");
        return;

    }

    total = total - discount;

    if(total < 0){
        total = 0;
    }

    document.getElementById("totalBill").innerText = total;

    updateProgress(total);

    alert("Coupon Applied Successfully");

}
       
       
       
      function updateProgress(total){

    const target = 1000;

    let percent = (total / target) * 100;

    if(percent > 100){

        percent = 100;

    }

    document.getElementById("progressBar").style.width =
    percent + "%";


    const left = target - total;


    if(left <= 0){

        document.getElementById("deliveryText").innerHTML =
        "🎉 Congratulations! Free Delivery Unlocked";

    }

    else{

        document.getElementById("deliveryText").innerHTML =
        "🚚 Add ₹" + left + " more to get FREE Delivery";

    }

}
